schema_version: 1
kind: degen_universe_policy

defaults:
  refresh_schedule: hourly
  hard_delete_after_days_below_floor: 7
  quote_assets_allowed:
    solana: [USDC, SOL]
    evm: [USDC, USDT, WETH, WBNB]
  canonical_pool:
    selection: liquidity_then_volume
    hysteresis_hours: 6

chains:
  solana:
    enabled: true
    discovery_sources: [dexscreener, geckoterminal, birdeye]
  base:
    enabled: true
    discovery_sources: [dexscreener, geckoterminal]
  bsc:
    enabled: true
    discovery_sources: [dexscreener, geckoterminal]

categories:
  meme_bluechip:
    max_tokens: 12
    min_daily_volume_usd: 5000000
    min_liquidity_usd: 1000000
    min_age_days: 90
    max_top10_holders_pct_ex_lp: 45

  meme_emerging:
    max_tokens: 12
    min_daily_volume_usd: 300000
    min_liquidity_usd: 150000
    min_age_days: 14
    max_top10_holders_pct_ex_lp: 35
    max_single_holder_pct_ex_lp: 8

  narrative_high_beta:
    max_tokens: 12
    min_daily_volume_usd: 1500000
    min_market_cap_usd: 50000000
    max_market_cap_usd: 1000000000
    min_age_days: 30

  dex_new_launch:
    max_tokens: 8
    min_hourly_volume_usd: 50000
    min_liquidity_usd: 100000
    min_age_hours: 6
    max_age_days: 14
    max_top10_holders_pct_ex_lp: 30
    max_single_holder_pct_ex_lp: 6
    require_security_screen: true
    auto_trade_enabled: false

  pre_cex_watch:
    max_tokens: 8
    min_daily_volume_usd: 250000
    min_liquidity_usd: 250000
    min_age_days: 7
    max_market_cap_usd: 50000000
    require_security_screen: true

anti_rug:
  solana:
    mint_authority_must_be_disabled: true
    freeze_authority_must_be_disabled: true
    creator_wallet_pct_max: 10
    lp_liquidity_usd_min: 100000
  evm:
    contract_verified_required: true
    ownership_renounced_or_timelocked: true
    max_tax_pct: 10
    lp_locked_or_burned_pct_min: 80

# whale_momentum — Smart money accumulating + positive momentum
name: Whale Momentum
slug: whale_momentum
description: >
  Fires when smart money wallets are accumulating a token
  and momentum indicators are positive.
version: "1.0"
enabled: true

# All required conditions must pass
required:
  - field: smart_money.consensus_direction
    operator: eq
    value: "accumulate"
  - field: smart_money.consensus_score
    operator: gte
    value: 55
  - field: smart_money.unique_wallets_buying
    operator: gte
    value: 2
  - field: universe_score
    operator: gte
    value: 40

# Confirmations boost confidence but aren't required
confirmations:
  - field: smart_money.tier_a_active
    operator: eq
    value: true
  - field: smart_money.accumulation_net_usd
    operator: gte
    value: 10000
  - field: volume_24h_change_pct
    operator: gte
    value: 50

# Playbook-level vetos
vetos:
  - field: risk_score
    operator: gte
    value: 70
  - field: smart_money.consensus_score
    operator: lt
    value: 40

base_confidence: 0.55
confidence_components:
  - field: smart_money.consensus_score
    weight: 3.0
    func: ramp
    lo: 50
    hi: 90
  - field: universe_score
    weight: 2.0
    func: ramp
    lo: 30
    hi: 80
  - field: smart_money.tier_a_active
    weight: 1.5
    func: boolf
    lo: 0
    hi: 1
  - field: risk_score
    weight: 1.0
    func: inv_ramp
    lo: 20
    hi: 70

edge_prior: 1.2

regime_fit:
  mania: 0.9
  rotation: 0.7
  low_activity: 0.4
  flight_to_quality: 0.3
  capitulation: 0.2

min_liquidity_usd: 20000
min_volume_24h_usd: 10000

services:
  backend:
    image: python:3.12-slim
    working_dir: /workspace/market-research-dashboard/backend
    environment:
      MARKETLAB_WORKSPACE: ${MARKETLAB_WORKSPACE:-/workspace/market-sentiment-lab}
      MARKETLAB_DEBUG: "1"
      MARKETLAB_CORS_ORIGINS: http://localhost:5173
    volumes:
      - .:/workspace/market-research-dashboard
      - ..:/workspace/market-sentiment-lab:rw
    command: >
      sh -lc "python3 -m pip install --no-cache-dir -r requirements.txt &&
      python3 manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /workspace/market-research-dashboard/frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_DEMO_MODE: "0"
    volumes:
      - .:/workspace/market-research-dashboard
    depends_on:
      - backend
    command: >
      sh -lc "npm ci &&
      npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

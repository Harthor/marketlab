app = "marketlab-api"
primary_region = "mia"

[build]

[env]
  DJANGO_SETTINGS_MODULE = "marketlab_backend.settings.production"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "marketlab_data"
  destination = "/data"
